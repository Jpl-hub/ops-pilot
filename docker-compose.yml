services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops-pilot-postgres
    environment:
      POSTGRES_DB: ops_pilot
      POSTGRES_USER: ops_pilot
      POSTGRES_PASSWORD: ops_pilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_pilot -d ops_pilot"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ops-pilot-api
    working_dir: /app
    environment:
      OPS_PILOT_ENV: development
      OPS_PILOT_HOST: 0.0.0.0
      OPS_PILOT_PORT: 8000
      OPS_PILOT_DEFAULT_PERIOD: 2025Q3
      OPS_PILOT_SAMPLE_DATA_PATH: data/bootstrap
      OPS_PILOT_OFFICIAL_DATA_PATH: data/raw/official
      OPS_PILOT_BRONZE_DATA_PATH: data/bronze/official
      OPS_PILOT_SILVER_DATA_PATH: data/silver/official
      OPS_PILOT_GOLD_DATA_PATH: data/gold/official
      OPS_PILOT_POSTGRES_DSN: postgresql+psycopg://ops_pilot:ops_pilot@postgres:5432/ops_pilot
      OPS_PILOT_CORS_ALLOWED_ORIGINS: http://127.0.0.1:8080,http://localhost:8080
      OPS_PILOT_OCR_PROVIDER: ${OPS_PILOT_OCR_PROVIDER:-PaddleOCR-VL}
      OPS_PILOT_OCR_MODEL: ${OPS_PILOT_OCR_MODEL:-PaddleOCR-VL-1.5}
      OPS_PILOT_OCR_RUNTIME_MODE: ${OPS_PILOT_OCR_RUNTIME_MODE:-service}
      OPS_PILOT_OCR_SERVICE_URL: ${OPS_PILOT_OCR_SERVICE_URL:-}
      OPS_PILOT_OCR_REQUEST_TIMEOUT_SECONDS: ${OPS_PILOT_OCR_REQUEST_TIMEOUT_SECONDS:-120}
      OPS_PILOT_OCR_ASSETS_PATH: ${OPS_PILOT_OCR_ASSETS_PATH:-models/paddleocr-vl}
      OPS_PILOT_OCR_RUNTIME_ENABLED: ${OPS_PILOT_OCR_RUNTIME_ENABLED:-false}
      OPS_PILOT_OPENAI_API_KEY: ${OPS_PILOT_OPENAI_API_KEY:-}
      OPS_PILOT_OPENAI_BASE_URL: ${OPS_PILOT_OPENAI_BASE_URL:-https://api.openai-proxy.org/v1}
      OPS_PILOT_KAFKA_BOOTSTRAP_SERVERS: ${OPS_PILOT_KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      OPS_PILOT_KAFKA_SIGNAL_TOPIC: ${OPS_PILOT_KAFKA_SIGNAL_TOPIC:-opspilot.external_signals}
      PYTHONPATH: /app/src
    volumes:
      - ./:/app
    command:
      [
        "sh",
        "-c",
        "ops-pilot-runtime-check --profile startup || true; python -c \"from opspilot.main import run_api; run_api()\"",
      ]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: node:20-alpine
    container_name: ops-pilot-ui
    working_dir: /app/frontend
    volumes:
      - ./:/app
      - ui_node_modules:/app/frontend/node_modules
    environment:
      VITE_PROXY_TARGET: http://api:8000
      VITE_API_BASE_URL: /api/v1
      VITE_WS_BASE_URL: /api/v1
    command: ["sh", "-c", "if [ ! -x /app/frontend/node_modules/.bin/vite ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 8080 --strictPort"]
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  ui_node_modules:
