services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops-pilot-postgres
    environment:
      POSTGRES_DB: ops_pilot
      POSTGRES_USER: ops_pilot
      POSTGRES_PASSWORD: ops_pilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ops-pilot-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ops-pilot-ui
    command: ["ops-pilot-ui"]
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  postgres_data:
